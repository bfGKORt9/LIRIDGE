name: LIRIDGE Web Deploy

on:
  workflow_dispatch:

# 必要最小限のグローバル権限（contents: read で安全性を担保）
permissions:
  contents: read

jobs:
  # 1. ビルドと品質チェックを行うジョブ
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # バージョンを3.22.2（安定版）に明示的に固定し、キャッシュを有効化
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 静的解析ステップを追加し、デプロイ前にコードの健全性をチェック
      - name: Analyze Code Quality
        run: flutter analyze

      # 不要なプロジェクト生成やパッチ処理を排除し、純粋にWebビルドのみを実行
      - name: Build Web Application
        run: flutter build web --base-href "/LIRIDGE/"

      # デプロイ用アーティファクトの安全な梱包
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # 2. デプロイ処理のみを分離した安全なジョブ
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # デプロイに必要な権限のみをここで付与
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
