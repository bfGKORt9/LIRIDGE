name: LIRIDGE Web Deploy (Glassmorphism)

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Glassmorphism Foundation
        run: |
          flutter create --project-name liridge --platforms web,ios,android .
          
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'dart:ui';
          import 'package:flutter/material.dart';

          void main() {
            runApp(const LiridgeApp());
          }

          class LiridgeApp extends StatelessWidget {
            const LiridgeApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'LIRIDGE CORE',
                theme: ThemeData.dark(),
                home: const UIRouter(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class UIRouter extends StatefulWidget {
            const UIRouter({super.key});

            @override
            State<UIRouter> createState() => _UIRouterState();
          }

          class _UIRouterState extends State<UIRouter> {
            int _uiMode = 0; 

            void _switchUI() {
              setState(() {
                _uiMode = (_uiMode + 1) % 3;
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.black,
                body: AnimatedSwitcher(
                  duration: const Duration(milliseconds: 800),
                  child: GlassmorphismFrame(key: ValueKey(_uiMode), mode: _uiMode),
                ),
                floatingActionButton: FloatingActionButton(
                  onPressed: _switchUI,
                  backgroundColor: Colors.white.withOpacity(0.15),
                  elevation: 0,
                  child: const Icon(Icons.change_circle, color: Colors.white),
                ),
              );
            }
          }

          class GlassmorphismFrame extends StatelessWidget {
            final int mode;
            const GlassmorphismFrame({super.key, required this.mode});

            @override
            Widget build(BuildContext context) {
              Color bgColor;
              Color accentColor;
              String title;

              switch (mode) {
                case 0: 
                  bgColor = const Color(0xFF4A0E0E); 
                  accentColor = const Color(0xFFFFD700); 
                  title = "Mary version";
                  break;
                case 1: 
                  bgColor = const Color(0xFF0F1A2C); 
                  accentColor = const Color(0xFFFF3333); 
                  title = "KyouAya version";
                  break;
                case 2: 
                default:
                  bgColor = const Color(0xFF2D1A11); 
                  accentColor = const Color(0xFFFF8C00); 
                  title = "Connecting Global Communities";
                  break;
              }

              return Stack(
                children: [
                  Container(
                    decoration: BoxDecoration(
                      color: bgColor,
                      gradient: RadialGradient(
                        center: Alignment.topCenter,
                        radius: 1.5,
                        colors: [bgColor.withOpacity(0.8), Colors.black87],
                      ),
                    ),
                  ),
                  
                  SafeArea(
                    child: Center(
                      child: ConstrainedBox(
                        constraints: const BoxConstraints(maxWidth: 450), 
                        child: Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 20.0, vertical: 10.0),
                          child: Column(
                            children: [
                              const SizedBox(height: 20),
                              Text("IRIDGE", style: TextStyle(fontSize: 36, fontWeight: FontWeight.w900, color: accentColor, letterSpacing: 3, shadows: const [Shadow(color: Colors.black54, blurRadius: 4, offset: Offset(2, 2))])),
                              Text(title, style: TextStyle(fontSize: 16, fontStyle: FontStyle.italic, color: accentColor.withOpacity(0.8))),
                              const SizedBox(height: 30),

                              Expanded(
                                child: ClipRRect(
                                  borderRadius: BorderRadius.circular(32),
                                  child: BackdropFilter(
                                    filter: ImageFilter.blur(sigmaX: 12, sigmaY: 12), 
                                    child: Container(
                                      width: double.infinity,
                                      decoration: BoxDecoration(
                                        color: Colors.white.withOpacity(0.05), 
                                        borderRadius: BorderRadius.circular(32),
                                        border: Border.all(color: Colors.white.withOpacity(0.2), width: 1.5), 
                                      ),
                                      child: Column(
                                        mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                                        children: [
                                          Container(
                                            width: 280, height: 100,
                                            decoration: BoxDecoration(
                                              color: Colors.black.withOpacity(0.4),
                                              borderRadius: BorderRadius.circular(12),
                                              border: Border.all(color: accentColor.withOpacity(0.3), width: 2),
                                            ),
                                            child: Center(child: Text("VU METER MOUNT", style: TextStyle(color: accentColor.withOpacity(0.5), letterSpacing: 2))),
                                          ),

                                          Container(
                                            width: 160, height: 160,
                                            decoration: BoxDecoration(
                                              shape: BoxShape.circle,
                                              color: Colors.black.withOpacity(0.5),
                                              border: Border.all(color: accentColor.withOpacity(0.8), width: 4),
                                              boxShadow: [BoxShadow(color: accentColor.withOpacity(0.2), blurRadius: 30, spreadRadius: 5)],
                                            ),
                                            child: Center(child: Icon(Icons.mic_none, size: 64, color: accentColor)),
                                          ),

                                          Row(
                                            mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                                            children: [
                                              _buildSwitch("DUCKING", accentColor),
                                              _buildSwitch("READING", accentColor),
                                              _buildSwitch("AUTO-TAP", accentColor),
                                            ],
                                          )
                                        ],
                                      ),
                                    ),
                                  ),
                                ),
                              ),
                              const SizedBox(height: 20),
                            ],
                          ),
                        ),
                      ),
                    ),
                  ),
                ],
              );
            }

            Widget _buildSwitch(String label, Color color) {
              return Column(
                mainAxisSize: MainAxisSize.min,
                children: [
                  Text(label, style: const TextStyle(fontSize: 10, color: Colors.white70, fontWeight: FontWeight.bold)),
                  const SizedBox(height: 12),
                  Container(
                    width: 32, height: 60,
                    decoration: BoxDecoration(color: Colors.black54, borderRadius: BorderRadius.circular(16), border: Border.all(color: Colors.white24)),
                    child: Center(
                      child: Container(width: 8, height: 30, decoration: BoxDecoration(color: Colors.grey.shade400, borderRadius: BorderRadius.circular(4))),
                    ),
                  ),
                  const SizedBox(height: 12),
                  Container(
                    width: 8, height: 8,
                    decoration: BoxDecoration(
                      shape: BoxShape.circle, color: color,
                      boxShadow: [BoxShadow(color: color, blurRadius: 8, spreadRadius: 2)],
                    ),
                  ),
                ],
              );
            }
          }
          EOF
          
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<\/dict>/i \    <key>NSMicrophoneUsageDescription<\/key>\n    <string>LIRIDGE 音声認識システムがマイクを使用します。<\/string>' ios/Runner/Info.plist
          flutter pub get

      - name: Build Web App
        run: flutter build web --base-href "/LIRIDGE/"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
